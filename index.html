<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>창고 관리 Pro</title>
    <style>
        :root { --primary: #2c3e50; --highlight: #ffeb3b; --border: #ccc; }
        body { font-family: sans-serif; margin: 0; background: #f0f0f0; font-size: 12px; }
        
        /* 상단 검색바 고정 및 슬림화 */
        .header { position: sticky; top: 0; background: #fff; padding: 10px; box-shadow: 0 1px 5px rgba(0,0,0,0.2); z-index: 100; }
        .search-box { width: 100%; padding: 8px; border: 1px solid var(--primary); border-radius: 4px; box-sizing: border-box; font-size: 14px; }

        .container { padding: 5px; }
        .shelf-title { background: var(--primary); color: white; padding: 5px 10px; margin-top: 10px; border-radius: 3px 3px 0 0; font-weight: bold; }

        /* 핵심: 가로 배열 유지 */
        .grid { display: grid; background: var(--border); gap: 1px; border: 1px solid var(--border); margin-bottom: 15px; }
        .k-grid { grid-template-columns: repeat(5, 1fr); } /* K회사 5열 고정 */
        .a-grid { grid-template-columns: repeat(4, 1fr); } /* A회사 4열 고정 */

        .cell { background: white; padding: 4px 2px; display: flex; flex-direction: column; }
        .cell-label { font-size: 9px; color: #999; text-align: center; margin-bottom: 2px; transform: scale(0.9); }

        /* 입력창 슬림화 */
        .item-input { 
            width: 100%; border: none; border-bottom: 1px solid #f0f0f0; 
            padding: 2px 0; font-size: 11px; outline: none; text-align: center;
        }
        .item-input:focus { background: #e3f2fd; }
        .item-input::placeholder { color: #eee; }

        /* 특수 구역 (위층, 바닥) - 가로 전체 차지 */
        .special-zone { grid-column: 1 / -1; background: #e9ecef; }
        .special-zone .item-input { background: #e9ecef; border-bottom: 1px solid #ddd; }

        /* 검색 결과 하이라이트 */
        .found { background-color: var(--highlight) !important; border: 1px solid #fbc02d; box-shadow: inset 0 0 5px rgba(0,0,0,0.1); }
        .found input { background-color: var(--highlight); }
    </style>
</head>
<body>

<div class="header">
    <input type="text" id="search" class="search-box" placeholder="물품 검색 (예: 밸브)" oninput="handleSearch()">
</div>

<div class="container">
    <div class="shelf-title">K회사 (5열 시스템)</div>
    <div id="k-container" class="grid k-grid"></div>

    <div class="shelf-title">A회사 (4열 시스템)</div>
    <div id="a-container" class="grid a-grid"></div>
</div>

<script>
    const K_CONFIG = { id: 'k', rows: 3, cols: 5 };
    const A_CONFIG = { id: 'a', rows: 3, cols: 4 };

    function initShelf(config) {
        const target = document.getElementById(`${config.id}-container`);
        
        // 1. 위층
        target.appendChild(createCell('TOP', `${config.id}-top`, true));

        // 2. 단별 열 배치
        for(let r=1; r<=config.rows; r++) {
            for(let c=1; c<=config.cols; c++) {
                target.appendChild(createCell(`${r}-${c}`, `${config.id}-${r}-${c}`));
            }
        }

        // 3. 바닥
        target.appendChild(createCell('BOTTOM', `${config.id}-bottom`, true));
    }

    function createCell(label, posId, isSpecial = false) {
        const div = document.createElement('div');
        div.className = `cell ${isSpecial ? 'special-zone' : ''}`;
        div.innerHTML = `<span class="cell-label">${label}</span>`;
        
        for(let i=1; i<=4; i++) {
            const input = document.createElement('input');
            input.className = 'item-input';
            input.placeholder = '.';
            input.dataset.key = `${posId}-${i}`;
            input.oninput = saveToLocal;
            div.appendChild(input);
        }
        return div;
    }

    function saveToLocal() {
        const data = {};
        document.querySelectorAll('.item-input').forEach(el => {
            if(el.value) data[el.dataset.key] = el.value;
        });
        localStorage.setItem('warehouse_v2', JSON.stringify(data));
    }

    function loadData() {
        const raw = localStorage.getItem('warehouse_v2');
        if(!raw) return;
        const data = JSON.parse(raw);
        document.querySelectorAll('.item-input').forEach(el => {
            if(data[el.dataset.key]) el.value = data[el.dataset.key];
        });
    }

    function handleSearch() {
        const word = document.getElementById('search').value.trim().toLowerCase();
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('found'));
        if(!word) return;
        document.querySelectorAll('.item-input').forEach(el => {
            if(el.value.toLowerCase().includes(word)) {
                el.closest('.cell').classList.add('found');
            }
        });
    }

    initShelf(K_CONFIG);
    initShelf(A_CONFIG);
    loadData();
</script>

</body>
</html>
