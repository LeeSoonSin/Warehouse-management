<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>퓨처스 창고 관리 시스템</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <div class="search-container">
        <input type="text" id="search" class="search-box" placeholder="🔍 물품 검색" oninput="onSearchInput()" autocomplete="off">
        <!-- 추천 목록 -->
        <div id="suggestionList" class="suggestion-list"></div>
    </div>
    <div class="backup-group">
        <button class="btn-small" onclick="exportData()">📤 백업</button>
        <button class="btn-small" onclick="importData()">📥 복구</button>
    </div>
</div>

<div class="container">
    <div class="shelf-title">🏢 케이씨 선반</div>
    <div id="k-container" class="grid k-grid"></div>

    <div class="shelf-title">🏢 원익 선반</div>
    <div id="a-container" class="grid a-grid"></div>

    <div class="shelf-title">🏢 포이스&에드워드 선반</div>
    <div id="c-container" class="grid c-grid"></div>
</div>

<!-- 상세 입력 모달 -->
<div id="modalOverlay">
    <div class="modal-content">
        <div id="modalTitle" class="modal-header">위치 상세</div>
        <div class="modal-inputs">
            <div class="modal-input-group">
                <input type="text" class="modal-input-item" placeholder="물품 1" oninput="onModalInput(this)" autocomplete="off">
            </div>
            <div class="modal-input-group">
                <input type="text" class="modal-input-item" placeholder="물품 2" oninput="onModalInput(this)" autocomplete="off">
            </div>
            <div class="modal-input-group">
                <input type="text" class="modal-input-item" placeholder="물품 3" oninput="onModalInput(this)" autocomplete="off">
            </div>
            <div class="modal-input-group">
                <input type="text" class="modal-input-item" placeholder="물품 4" oninput="onModalInput(this)" autocomplete="off">
            </div>
            <div class="modal-input-group">
                <input type="text" class="modal-input-item" placeholder="물품 5" oninput="onModalInput(this)" autocomplete="off">
            </div>
            <div class="modal-input-group">
                <input type="text" class="modal-input-item" placeholder="물품 6" oninput="onModalInput(this)" autocomplete="off">
            </div>
        </div>
        <div id="modalSuggestionList" class="suggestion-list"></div>

        <div class="btn-group">
            <button class="btn btn-close" onclick="closeModal()">취소</button>
            <button class="btn btn-save" onclick="saveModal()">저장</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
